name: job-match-assistant

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: job_match_assistant
      POSTGRES_USER: job_match
      POSTGRES_PASSWORD: job_match_local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_match -d job_match_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://job_match:job_match_local@postgres:5432/job_match_assistant
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_BASE_URL: http://localhost:5173
      FEEDBACK_STORAGE_DIR: /data
      BASIC_AUTH_USERS: ""
      LLM_PROVIDER: none
      OPENAI_API_KEY: ""
      OPENAI_STORE_RESPONSES: "false"
      OPENAI_DEBUG_RESPONSES: "false"
    ports:
      - "8000:8000"
    volumes:
      - app-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_MATCH_API_MODE: mock
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  app-data:
