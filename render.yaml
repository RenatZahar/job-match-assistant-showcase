services:
  - type: web
    name: job-match-assistant-api-showcase
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BASIC_AUTH_USERS
        sync: false
      - key: LLM_PROVIDER
        value: none
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: OPENAI_STORE_RESPONSES
        value: "false"
      - key: OPENAI_DEBUG_RESPONSES
        value: "false"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "60"
      - key: OPENAI_MAX_RETRIES
        value: "2"
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "4000"
